services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: test_database
      FRONTEND_URL: http://localhost:4520
      JWT_SECRET: dev-secret
    depends_on:
      - mongo
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ""
    depends_on:
      - backend
    ports:
      - "4520:4520"

volumes:
  mongo_data:

